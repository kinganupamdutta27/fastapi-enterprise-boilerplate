apiVersion: v1
kind: ConfigMap
metadata:
  name: fastapi-config
  namespace: fastapi-app
  labels:
    app.kubernetes.io/name: fastapi-app
data:
  APP_ENV: "production"
  APP_LOG_LEVEL: "INFO"
  DATABASE_HOST: "pgbouncer"
  DATABASE_PORT: "6432"
  DATABASE_NAME: "app_db"
  DB_POOL_MIN_SIZE: "2"
  DB_POOL_MAX_SIZE: "10"
  DB_COMMAND_TIMEOUT: "60"
  DB_STATEMENT_TIMEOUT: "5000"
  DB_IDLE_IN_TRANSACTION_TIMEOUT: "10000"
  CB_FAIL_MAX: "5"
  CB_TIMEOUT_DURATION: "30"
  DB_RETRY_ATTEMPTS: "3"
  REDIS_URL: "redis://redis-svc:6379/0"
  RABBITMQ_URL: "amqp://guest:guest@rabbitmq-svc:5672/"
  KAFKA_BOOTSTRAP_SERVERS: "kafka-svc:9092"
  ELASTICSEARCH_URL: "http://elasticsearch-svc:9200"
